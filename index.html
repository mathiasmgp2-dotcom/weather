<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Weather">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#87CEEB" id="theme-meta">
  <link rel="manifest" href="manifest.json">
  <title>Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --c1: #87CEEB; --c2: #B0D8F0; --c3: #D6EAF8;
      --glass-bg: rgba(255,255,255,0.22);
      --glass-bg-heavy: rgba(255,255,255,0.32);
      --glass-border: rgba(255,255,255,0.55);
      --glass-specular: rgba(255,255,255,0.70);
      --text-primary: rgba(10,10,30,0.90);
      --text-secondary: rgba(10,10,30,0.50);
      --text-tertiary: rgba(10,10,30,0.35);
      --shadow: rgba(0,0,50,0.12);
    }

    html, body { height: 100%; width: 100%; overflow: hidden; }

    body {
      font-family: 'Figtree', -apple-system, sans-serif;
      color: var(--text-primary);
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* ── ANIMATED BACKGROUND MESH ── */
    #bg {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(145deg, var(--c1) 0%, var(--c2) 50%, var(--c3) 100%);
      transition: background 2.5s ease;
    }
    #bg::before, #bg::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.6;
      animation: morph 12s ease-in-out infinite alternate;
    }
    #bg::before {
      width: 70vw; height: 70vw;
      background: rgba(255,255,255,0.35);
      top: -15vw; left: -10vw;
    }
    #bg::after {
      width: 55vw; height: 55vw;
      background: rgba(255,255,255,0.20);
      bottom: -10vw; right: -10vw;
      animation-delay: -6s;
    }
    @keyframes morph {
      from { transform: scale(1) translate(0,0); }
      to   { transform: scale(1.15) translate(5vw, 4vw); }
    }

    /* ── NOISE TEXTURE OVERLAY ── */
    #noise {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    /* ── LIQUID GLASS MIXIN ── */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(40px) saturate(200%);
      -webkit-backdrop-filter: blur(40px) saturate(200%);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow:
        inset 0 1.5px 0 var(--glass-specular),
        inset 0 -0.5px 0 rgba(255,255,255,0.15),
        0 8px 32px var(--shadow),
        0 1px 0 rgba(255,255,255,0.4);
      position: relative;
      overflow: hidden;
    }
    .glass::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg,
        rgba(255,255,255,0.18) 0%,
        rgba(255,255,255,0.04) 50%,
        rgba(255,255,255,0.0) 100%);
      pointer-events: none;
      border-radius: inherit;
    }
    .glass-pill {
      background: var(--glass-bg-heavy);
      backdrop-filter: blur(32px) saturate(180%);
      -webkit-backdrop-filter: blur(32px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      box-shadow:
        inset 0 1px 0 var(--glass-specular),
        0 4px 16px var(--shadow);
    }

    /* ── LAYOUT ── */
    #app-wrap {
      position: relative; z-index: 2;
      width: 100%; max-width: 420px;
      height: 100dvh;
      display: flex; flex-direction: column;
      padding: calc(env(safe-area-inset-top) + 16px) 20px calc(env(safe-area-inset-bottom) + 20px);
      gap: 14px;
    }

    /* ── SETUP SCREEN ── */
    #setup {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 24px;
    }
    .setup-card {
      width: 100%; max-width: 380px;
      padding: 36px 28px;
      display: flex; flex-direction: column; gap: 18px;
      border-radius: 32px;
      animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .setup-icon { font-size: 3rem; text-align: center; }
    .setup-title {
      font-size: 1.9rem; font-weight: 700;
      text-align: center; letter-spacing: -0.03em;
      color: var(--text-primary);
    }
    .setup-sub {
      font-size: 0.88rem; color: var(--text-secondary);
      text-align: center; line-height: 1.6;
    }
    .setup-sub a { color: var(--text-primary); font-weight: 500; }
    .setup-warn {
      font-size: 0.78rem; color: var(--text-secondary);
      text-align: center; line-height: 1.5;
      padding: 10px 14px;
      background: rgba(255,160,0,0.12);
      border-radius: 12px;
      border: 1px solid rgba(255,160,0,0.2);
    }

    /* ── INPUTS & BUTTONS ── */
    .glass-input {
      width: 100%; padding: 14px 18px;
      background: rgba(255,255,255,0.28);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 16px;
      font-family: 'Figtree', sans-serif;
      font-size: 1rem; font-weight: 400;
      color: var(--text-primary);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 2px 8px var(--shadow);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .glass-input:focus {
      border-color: rgba(255,255,255,0.9);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 0 0 3px rgba(255,255,255,0.3);
    }
    .glass-input::placeholder { color: var(--text-tertiary); }

    .btn-primary {
      width: 100%; padding: 15px;
      background: rgba(10,10,30,0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: rgba(255,255,255,0.95);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      font-family: 'Figtree', sans-serif;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; letter-spacing: -0.01em;
      transition: opacity 0.15s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(0,0,30,0.2);
    }
    .btn-primary:active { opacity: 0.7; transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.35; cursor: default; }

    /* ── TOP BAR ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px;
    }
    .loc-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 16px 9px 12px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      max-width: calc(100% - 110px);
    }
    .loc-pill:active { opacity: 0.6; transform: scale(0.97); }
    .loc-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(10,10,30,0.5);
      flex-shrink: 0;
    }
    .loc-name {
      font-size: 0.92rem; font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .loc-chevron { font-size: 0.65rem; color: var(--text-tertiary); flex-shrink: 0; }

    .topbar-actions { display: flex; gap: 8px; }
    .icon-btn {
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem;
      transition: opacity 0.15s, transform 0.15s;
    }
    .icon-btn:active { opacity: 0.5; transform: scale(0.9); }

    /* ── MAIN WEATHER ── */
    .weather-main {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; gap: 4px;
      padding: 12px 0;
    }

    .w-icon-wrap {
      position: relative; margin-bottom: 8px;
    }
    .w-icon {
      font-size: clamp(4.5rem, 18vw, 6rem);
      filter: drop-shadow(0 12px 24px rgba(0,0,40,0.15));
      animation: floatIcon 5s ease-in-out infinite;
      display: block;
    }
    @keyframes floatIcon {
      0%,100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
    }

    .w-temp {
      font-size: clamp(6rem, 24vw, 8.5rem);
      font-weight: 300;
      letter-spacing: -0.04em;
      line-height: 0.9;
      color: var(--text-primary);
    }
    .w-unit {
      font-size: 0.28em;
      font-weight: 400;
      vertical-align: super;
      margin-left: -0.1em;
      color: var(--text-secondary);
    }
    .w-desc {
      font-size: clamp(1.1rem, 4vw, 1.3rem);
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 0.005em;
      margin-top: 6px;
    }
    .w-location-sub {
      font-size: 0.8rem;
      color: var(--text-tertiary);
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .w-feelslike {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* ── STATS GRID ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .stat {
      padding: 14px 6px;
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
      border-radius: 20px;
      animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .stat:nth-child(1) { animation-delay: 0.05s; }
    .stat:nth-child(2) { animation-delay: 0.10s; }
    .stat:nth-child(3) { animation-delay: 0.15s; }
    .stat:nth-child(4) { animation-delay: 0.20s; }
    .stat-icon { font-size: 1.3rem; }
    .stat-val {
      font-size: 0.95rem; font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }
    .stat-lbl {
      font-size: 0.62rem; font-weight: 500;
      color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    /* ── UPDATED BAR ── */
    .updated-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; padding: 8px 16px;
    }
    .updated-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(10,10,30,0.25);
    }
    .updated-txt {
      font-size: 0.72rem; color: var(--text-tertiary);
      letter-spacing: 0.04em;
    }

    /* ── SEARCH / LOCATION SHEET ── */
    #sheet-bg {
      display: none; position: fixed; inset: 0; z-index: 30;
      background: rgba(0,0,20,0.3);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      animation: fadeIn 0.2s ease both;
    }
    #sheet-bg.open { display: flex; align-items: flex-end; justify-content: center; }

    #sheet {
      width: 100%; max-width: 420px;
      max-height: 82dvh;
      border-radius: 28px 28px 0 0;
      padding: 0 0 calc(env(safe-area-inset-bottom) + 16px);
      display: flex; flex-direction: column;
      animation: slideSheet 0.4s cubic-bezier(0.34,1.3,0.64,1) both;
      overflow: hidden;
    }
    @keyframes slideSheet {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .sheet-handle {
      width: 40px; height: 5px; border-radius: 3px;
      background: rgba(10,10,30,0.2);
      margin: 12px auto 16px;
      flex-shrink: 0;
    }

    .sheet-title {
      font-size: 1.1rem; font-weight: 700;
      letter-spacing: -0.02em;
      padding: 0 20px 14px;
      color: var(--text-primary);
      flex-shrink: 0;
    }

    .sheet-search-row {
      display: flex; gap: 10px; align-items: center;
      padding: 0 20px 16px;
      flex-shrink: 0;
    }
    .sheet-search-row .glass-input { flex: 1; }
    .sheet-gps-btn {
      width: 48px; height: 48px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; cursor: pointer;
      border-radius: 14px;
      background: rgba(255,255,255,0.28);
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
      transition: opacity 0.15s, transform 0.15s;
    }
    .sheet-gps-btn:active { opacity: 0.5; transform: scale(0.93); }

    .sheet-scroll { overflow-y: auto; flex: 1; padding: 0 20px; }
    .sheet-section-title {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 8px; margin-top: 6px;
    }
    .city-row {
      display: flex; align-items: center;
      padding: 13px 16px; border-radius: 16px;
      cursor: pointer; gap: 12px;
      transition: background 0.15s;
      margin-bottom: 4px;
    }
    .city-row:active { background: rgba(255,255,255,0.3); }
    .city-row-icon { font-size: 1rem; flex-shrink: 0; }
    .city-row-name { flex: 1; font-size: 0.95rem; font-weight: 500; color: var(--text-primary); }
    .city-row-action {
      font-size: 0.75rem; color: var(--text-tertiary);
      cursor: pointer; padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .city-row-action:active { background: rgba(255,255,255,0.3); }

    /* ── LOADING ── */
    #loading {
      display: none; position: fixed; inset: 0; z-index: 40;
      align-items: center; justify-content: center;
    }
    .spinner-wrap { padding: 24px; border-radius: 24px; }
    .spinner {
      width: 32px; height: 32px;
      border: 2.5px solid rgba(10,10,30,0.15);
      border-top-color: rgba(10,10,30,0.6);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: calc(env(safe-area-inset-bottom) + 90px);
      left: 50%; transform: translateX(-50%);
      z-index: 60; display: none;
      padding: 11px 20px; border-radius: 100px;
      font-size: 0.85rem; font-weight: 500;
      white-space: nowrap;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    #toast.error {
      background: rgba(220,50,50,0.85);
      border: 1px solid rgba(255,100,100,0.4);
      color: white;
    }
    #toast.info {
      background: rgba(10,10,30,0.75);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translate(-50%, 20px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }

    /* Non-toast slideUp */
    .setup-card, .stat {
      animation: _slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes _slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .refresh-spin { animation: spin 0.7s linear infinite !important; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* hide initially */
    #app-wrap { display: none; }
    #app-wrap.visible { display: flex; }
  </style>
</head>
<body>
  <div id="bg"></div>
  <div id="noise"></div>

  <!-- LOADING -->
  <div id="loading"><div class="spinner-wrap glass" style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px 28px;"><div class="spinner"></div><span id="loading-msg" style="font-size:0.78rem;font-weight:500;color:var(--text-secondary);letter-spacing:0.03em;">Buscando dados...</span></div></div>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- SETUP -->
  <div id="setup">
    <div class="setup-card glass">
      <div class="setup-icon">🌤️</div>
      <div class="setup-title">Weather</div>
      <div class="setup-sub">Cole sua API key da <a href="https://weatherstack.com" target="_blank">Weatherstack</a> para começar.</div>
      <input class="glass-input" type="password" id="key-input" placeholder="Cole sua API key aqui..." autocomplete="off" spellcheck="false">
      <button class="btn-primary" id="save-btn">Entrar →</button>
      <div class="setup-warn">⚠️ Plano free: use HTTP. No GitHub Pages (HTTPS) é necessário plano pago ou o proxy automático do app tentará contornar.</div>
    </div>
  </div>

  <!-- APP -->
  <div id="app-wrap">
    <!-- TOP BAR -->
    <div class="topbar">
      <div class="loc-pill glass-pill" id="loc-pill">
        <div class="loc-dot"></div>
        <span class="loc-name" id="loc-name">—</span>
        <span class="loc-chevron">▾</span>
      </div>
      <div class="topbar-actions">
        <div class="icon-btn glass-pill" id="refresh-btn" style="width:38px;height:38px;border-radius:50%;">↻</div>
        <div class="icon-btn glass-pill" id="settings-btn" style="width:38px;height:38px;border-radius:50%;">⚙</div>
      </div>
    </div>

    <!-- MAIN WEATHER -->
    <div class="weather-main" id="weather-main">
      <div class="w-icon-wrap">
        <span class="w-icon" id="w-icon">🌤️</span>
      </div>
      <div class="w-temp" id="w-temp">—<span class="w-unit">°C</span></div>
      <div class="w-desc" id="w-desc">—</div>
      <div class="w-location-sub" id="w-country"></div>
      <div class="w-feelslike" id="w-feel"></div>
    </div>

    <!-- STATS -->
    <div class="stats" id="stats">
      <div class="stat glass">
        <span class="stat-icon">💧</span>
        <span class="stat-val" id="s-hum">—</span>
        <span class="stat-lbl">Umidade</span>
      </div>
      <div class="stat glass">
        <span class="stat-icon">💨</span>
        <span class="stat-val" id="s-wind">—</span>
        <span class="stat-lbl">Vento</span>
      </div>
      <div class="stat glass">
        <span class="stat-icon">🌡️</span>
        <span class="stat-val" id="s-uv">—</span>
        <span class="stat-lbl">UV</span>
      </div>
      <div class="stat glass">
        <span class="stat-icon">👁️</span>
        <span class="stat-val" id="s-vis">—</span>
        <span class="stat-lbl">Visib.</span>
      </div>
    </div>

    <!-- UPDATED -->
    <div class="updated-bar">
      <div class="updated-dot"></div>
      <span class="updated-txt" id="updated-txt">—</span>
    </div>
  </div>

  <!-- LOCATION SHEET -->
  <div id="sheet-bg">
    <div id="sheet" class="glass" style="border-radius:28px 28px 0 0;">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Localização</div>
      <div class="sheet-search-row">
        <input class="glass-input" type="text" id="city-input" placeholder="Buscar cidade..." autocomplete="off">
        <div class="sheet-gps-btn" id="gps-btn" title="Usar minha localização">📍</div>
      </div>
      <div class="sheet-scroll" id="sheet-scroll">
        <div id="favs-section"></div>
        <div id="recents-section"></div>
      </div>
    </div>
  </div>

  <script>
  // ── PROXIES (tentados em ordem até um funcionar)
  const PROXIES = [
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  ];

  async function fetchWithProxy(apiUrl, timeoutMs = 5000) {
    let lastErr = null;
    for (let i = 0; i < PROXIES.length; i++) {
      const proxyUrl = PROXIES[i](apiUrl);
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        setLoadingMsg(i === 0 ? 'Buscando dados...' : `Tentativa ${i + 1}...`);
        const res = await fetch(proxyUrl, { signal: controller.signal });
        clearTimeout(timer);
        if (!res.ok) continue;
        const text = await res.text();
        const data = JSON.parse(text);
        if (data && data.contents) return JSON.parse(data.contents);
        return data;
      } catch(e) {
        clearTimeout(timer);
        lastErr = e;
      }
    }
    throw lastErr || new Error('Todos os proxies falharam');
  }

  // Safety net: nunca fica preso no loading por mais de 20s
  let safetyTimer = null;
  function armSafetyNet() {
    clearTimeout(safetyTimer);
    safetyTimer = setTimeout(() => {
      setLoading(false);
      showToast('Tempo esgotado. Tente novamente.', 'error');
    }, 20000);
  }
  function clearSafetyNet() { clearTimeout(safetyTimer); }

  // ── STATE
  let apiKey   = localStorage.getItem('wkey') || '';
  let lastCity = localStorage.getItem('wcity') || 'São Paulo';
  let favs     = JSON.parse(localStorage.getItem('wfavs')    || '["São Paulo"]');
  let recents  = JSON.parse(localStorage.getItem('wrecents') || '[]');

  // ── DOM
  const $ = id => document.getElementById(id);
  const setup     = $('setup');
  const appWrap   = $('app-wrap');
  const keyInput  = $('key-input');
  const saveBtn   = $('save-btn');
  const locPill   = $('loc-pill');
  const locName   = $('loc-name');
  const refreshBtn= $('refresh-btn');
  const settingsBtn=$('settings-btn');
  const sheetBg   = $('sheet-bg');
  const cityInput = $('city-input');
  const gpsBtn    = $('gps-btn');
  const loading   = $('loading');
  const toastEl   = $('toast');

  // ── INIT
  if (apiKey) bootApp();

  saveBtn.addEventListener('click', () => {
    const k = keyInput.value.trim();
    if (!k) return;
    apiKey = k;
    localStorage.setItem('wkey', k);
    bootApp();
  });
  keyInput.addEventListener('keydown', e => e.key === 'Enter' && saveBtn.click());

  function bootApp() {
    setup.style.display = 'none';
    appWrap.classList.add('visible');
    fetchWeather(lastCity);
  }

  // ── WEATHER THEMES
  const THEMES = {
    sunny:   { c1:'#FFB347', c2:'#FFD580', c3:'#FFEAA7', icon:'☀️' },
    clear:   { c1:'#FFB347', c2:'#FFD580', c3:'#FFEAA7', icon:'☀️' },
    'partly cloudy': { c1:'#74B9FF', c2:'#A8D8EA', c3:'#D6EAF8', icon:'⛅' },
    cloudy:  { c1:'#A0B3C5', c2:'#C4D3DE', c3:'#DDE8EF', icon:'☁️' },
    overcast:{ c1:'#8A9BAB', c2:'#B2C0CA', c3:'#CDD6DD', icon:'☁️' },
    rain:    { c1:'#3E6B8A', c2:'#5B8FA8', c3:'#7FB2C9', icon:'🌧️' },
    drizzle: { c1:'#5B8FA8', c2:'#7BAFC8', c3:'#9EC9DC', icon:'🌦️' },
    thunder: { c1:'#2D2D44', c2:'#3D3D5C', c3:'#565675', icon:'⛈️' },
    storm:   { c1:'#1A1A2E', c2:'#2D2D44', c3:'#3D3D5C', icon:'🌩️' },
    snow:    { c1:'#B8D8E8', c2:'#D6EAF8', c3:'#EBF5FB', icon:'❄️' },
    fog:     { c1:'#B0BEC5', c2:'#CFD8DC', c3:'#ECEFF1', icon:'🌫️' },
    mist:    { c1:'#B0BEC5', c2:'#CFD8DC', c3:'#ECEFF1', icon:'🌫️' },
    haze:    { c1:'#C8A96E', c2:'#DBC08A', c3:'#EDD9A3', icon:'🌁' },
    night:   { c1:'#1A1A3E', c2:'#2D2D6E', c3:'#3D3D8E', icon:'🌙' },
  };

  function getTheme(desc, isNight) {
    if (isNight) return THEMES.night;
    const d = desc.toLowerCase();
    for (const [key, val] of Object.entries(THEMES)) {
      if (d.includes(key)) return val;
    }
    return THEMES['partly cloudy'];
  }

  function applyTheme(theme) {
    const root = document.documentElement;
    root.style.setProperty('--c1', theme.c1);
    root.style.setProperty('--c2', theme.c2);
    root.style.setProperty('--c3', theme.c3);
    $('bg').style.background = `linear-gradient(145deg, ${theme.c1}, ${theme.c2}, ${theme.c3})`;
    $('theme-meta').setAttribute('content', theme.c1);

    // Adapt text color for dark themes
    const dark = ['night','thunder','storm'].some(k => theme === THEMES[k]);
    const tp = dark ? 'rgba(255,255,255,0.92)' : 'rgba(10,10,30,0.90)';
    const ts = dark ? 'rgba(255,255,255,0.55)' : 'rgba(10,10,30,0.50)';
    const tt = dark ? 'rgba(255,255,255,0.35)' : 'rgba(10,10,30,0.35)';
    root.style.setProperty('--text-primary', tp);
    root.style.setProperty('--text-secondary', ts);
    root.style.setProperty('--text-tertiary', tt);
    root.style.setProperty('--glass-bg', dark ? 'rgba(255,255,255,0.10)' : 'rgba(255,255,255,0.22)');
    root.style.setProperty('--glass-bg-heavy', dark ? 'rgba(255,255,255,0.16)' : 'rgba(255,255,255,0.32)');
    root.style.setProperty('--glass-border', dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.55)');
    root.style.setProperty('--glass-specular', dark ? 'rgba(255,255,255,0.30)' : 'rgba(255,255,255,0.70)');
    root.style.setProperty('--shadow', dark ? 'rgba(0,0,0,0.35)' : 'rgba(0,0,50,0.12)');
  }

  // ── FETCH
  async function fetchWeather(city) {
    setLoading(true);
    armSafetyNet();
    try {
      const apiUrl = `http://api.weatherstack.com/current?access_key=${apiKey}&query=${encodeURIComponent(city)}&units=m`;
      const data = await fetchWithProxy(apiUrl);
      if (!data || (!data.current && !data.error)) throw new Error('Resposta inválida');
      if (data.error) { showToast(data.error.info || 'Erro na API', 'error'); return; }
      lastCity = city;
      localStorage.setItem('wcity', city);
      addRecent(city);
      render(data);
    } catch(e) {
      showToast('Não foi possível carregar. Tente novamente.', 'error');
    } finally {
      clearSafetyNet();
      setLoading(false);
    }
  }

  function render(data) {
    const c = data.current, loc = data.location;
    const desc = c.weather_descriptions[0] || '';
    const isNight = c.is_day === 'no';
    const theme = getTheme(desc, isNight);
    applyTheme(theme);

    $('w-icon').textContent = theme.icon;
    $('w-temp').innerHTML = `${Math.round(c.temperature)}<span class="w-unit">°C</span>`;
    $('w-desc').textContent = desc;
    $('w-country').textContent = [loc.name, loc.country].filter(Boolean).join(', ');
    $('w-feel').textContent = `Sensação de ${Math.round(c.feelslike)}°C`;
    locName.textContent = loc.name;

    $('s-hum').textContent  = c.humidity + '%';
    $('s-wind').textContent = c.wind_speed + ' km/h';
    $('s-uv').textContent   = c.uv_index ?? '—';
    $('s-vis').textContent  = c.visibility + ' km';

    const now = new Date();
    const hm = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    $('updated-txt').textContent = `Atualizado às ${hm}`;
  }

  // ── LOCATION SHEET
  locPill.addEventListener('click', openSheet);
  $('sheet-bg').addEventListener('click', e => { if (e.target === sheetBg) closeSheet(); });

  function openSheet() {
    renderSheet();
    sheetBg.classList.add('open');
    setTimeout(() => cityInput.focus(), 400);
  }
  function closeSheet() {
    sheetBg.classList.remove('open');
    cityInput.value = '';
  }

  cityInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const city = cityInput.value.trim();
      if (!city) return;
      closeSheet();
      fetchWeather(city);
    }
  });

  // GPS
  gpsBtn.addEventListener('click', () => {
    if (!navigator.geolocation) { showToast('GPS não disponível', 'error'); return; }
    gpsBtn.textContent = '⏳';
    navigator.geolocation.getCurrentPosition(
      pos => {
        gpsBtn.textContent = '📍';
        closeSheet();
        const query = `${pos.coords.latitude},${pos.coords.longitude}`;
        fetchWeather(query);
      },
      () => {
        gpsBtn.textContent = '📍';
        showToast('Permissão de GPS negada', 'error');
      },
      { timeout: 8000 }
    );
  });

  function renderSheet() {
    const favsSection    = $('favs-section');
    const recentsSection = $('recents-section');
    favsSection.innerHTML = '';
    recentsSection.innerHTML = '';

    if (favs.length) {
      const t = document.createElement('div');
      t.className = 'sheet-section-title';
      t.textContent = 'Favoritos';
      favsSection.appendChild(t);
      favs.forEach(city => favsSection.appendChild(makeRow(city, '⭐', true)));
    }

    const recentFiltered = recents.filter(c => !favs.includes(c));
    if (recentFiltered.length) {
      const t = document.createElement('div');
      t.className = 'sheet-section-title';
      t.textContent = 'Recentes';
      recentsSection.appendChild(t);
      recentFiltered.slice(0, 6).forEach(city => recentsSection.appendChild(makeRow(city, '🕐', false)));
    }
  }

  function makeRow(city, icon, isFav) {
    const row = document.createElement('div');
    row.className = 'city-row';

    const ico = document.createElement('span');
    ico.className = 'city-row-icon';
    ico.textContent = icon;

    const name = document.createElement('span');
    name.className = 'city-row-name';
    name.textContent = city;

    const action = document.createElement('span');
    action.className = 'city-row-action';

    if (isFav) {
      action.textContent = '✕';
      action.title = 'Remover favorito';
      action.addEventListener('click', e => {
        e.stopPropagation();
        favs = favs.filter(c => c !== city);
        localStorage.setItem('wfavs', JSON.stringify(favs));
        renderSheet();
      });
    } else {
      action.textContent = '★';
      action.title = 'Favoritar';
      action.addEventListener('click', e => {
        e.stopPropagation();
        if (!favs.includes(city)) favs.unshift(city);
        localStorage.setItem('wfavs', JSON.stringify(favs));
        showToast(`${city} adicionado aos favoritos`, 'info');
        renderSheet();
      });
    }

    row.appendChild(ico);
    row.appendChild(name);
    row.appendChild(action);
    row.addEventListener('click', () => { closeSheet(); fetchWeather(city); });
    return row;
  }

  function addRecent(city) {
    if (!city.includes(',')) { // skip coord strings
      recents = [city, ...recents.filter(c => c.toLowerCase() !== city.toLowerCase())].slice(0, 12);
      localStorage.setItem('wrecents', JSON.stringify(recents));
    }
  }

  // ── REFRESH
  refreshBtn.addEventListener('click', () => {
    refreshBtn.classList.add('refresh-spin');
    fetchWeather(lastCity);
    setTimeout(() => refreshBtn.classList.remove('refresh-spin'), 1000);
  });

  // ── SETTINGS
  settingsBtn.addEventListener('click', () => {
    if (confirm('Trocar API key?')) {
      localStorage.removeItem('wkey');
      location.reload();
    }
  });

  // ── HELPERS
  function setLoading(v) { loading.style.display = v ? "flex" : "none"; if (!v) setLoadingMsg("Buscando dados..."); }
  function setLoadingMsg(msg) { const el = document.getElementById("loading-msg"); if (el) el.textContent = msg; }

  let toastTimer;
  function showToast(msg, type = 'info') {
    toastEl.textContent = msg;
    toastEl.className = type;
    toastEl.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toastEl.style.display = 'none'; }, 3500);
  }

  // ── SERVICE WORKER
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
  </script>
</body>
</html>
